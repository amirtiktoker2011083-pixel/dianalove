<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diana Sakura</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    min-height:100vh;
    overflow-x:hidden;

    font-family:Arial,sans-serif;

    /* РОЗОВО БЕЛЫЙ ФОН */

    background:
    linear-gradient(
    135deg,
    #ffffff 0%,
    #ffd6ea 25%,
    #ffb6d9 50%,
    #ffd6ea 75%,
    #ffffff 100%
    );

    position:relative;
}

/* БЕЛЫЕ ТОЧКИ */

body::before{
    content:"";

    position:fixed;

    width:100%;
    height:100%;

    background-image:
    radial-gradient(rgba(255,255,255,0.9) 2px, transparent 2px);

    background-size:40px 40px;

    transform:rotate(-20deg) scale(1.2);

    opacity:0.7;

    z-index:0;
}

/* ФОТО */

.photo{
    position:absolute;

    width:150px;

    z-index:3;

    transition:0.3s;
}

.photo:hover{
    transform:scale(1.05);
}

/* РАСПОЛОЖЕНИЕ */

.photo1{
    top:90px;
    left:25px;

    transform:rotate(-5deg);
}

.photo2{
    top:300px;
    right:25px;

    transform:rotate(5deg);
}

.photo3{
    top:520px;
    left:70px;

    transform:rotate(-4deg);
}

/* PLAYLIST */

.playlist{
    position:relative;

    margin-top:760px;

    text-align:center;

    z-index:5;

    padding-bottom:50px;
}

/* ТЕКСТ PLAYLIST */

.playlist h1{

    color:white;

    font-size:38px;

    margin-bottom:25px;

    text-shadow:
    0 0 10px white,
    0 0 20px white,
    0 0 35px white;
}

/* ТРЕКИ */

.track{
    margin:18px 0;
}

.track p{

    color:white;

    margin-bottom:8px;

    font-size:16px;

    text-shadow:
    0 0 8px white,
    0 0 15px white;
}

/* АУДИО */

audio{
    width:260px;

    border-radius:20px;

    opacity:0.95;
}

/* 🌸 САКУРА */

.sakura{
    position:fixed;

    top:-100px;

    font-size:28px;

    pointer-events:none;

    animation:fall linear infinite;

    z-index:2;
}

/* АНИМАЦИЯ */

@keyframes fall{

    0%{
        transform:
        translateY(-100px)
        translateX(0px)
        rotate(0deg);

        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:
        translateY(120vh)
        translateX(80px)
        rotate(360deg);

        opacity:0;
    }
}

</style>
</head>

<body>

<!-- 🌸 ЛЕПЕСТКИ -->
