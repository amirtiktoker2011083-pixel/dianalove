<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana Sakura</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    min-height:100vh;
    background:linear-gradient(180deg,#fff4fa,#ffd6ea,#ffbddb);
    overflow-x:hidden;
}

/* кнопка */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding-top:60px;
}

.love-btn{
    background:#ff8fc7;
    color:white;
    padding:16px 36px;
    border-radius:999px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    border:none;
    transition:0.3s;
    margin-bottom:40px;
}

.love-btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px rgba(255,255,255,0.7);
}

/* PLAYLIST */
.playlist{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    margin-top:20px;
}

.playlist-title{
    color:white;
    font-size:40px;
    font-weight:bold;
    text-shadow:0 0 15px white;
    margin-bottom:10px;
}

/* TRACKS */
.track{
    width:320px;
    padding:14px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;

    background:rgba(255,255,255,0.15);
    color:white;
    border:2px solid white;

    transition:0.25s;
    text-shadow:0 0 8px white;
}

.track:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(255,255,255,0.5);
}

.track.active{
    background:rgba(255,255,255,0.35);
    box-shadow:0 0 25px white;
}

/* 🌸 сакура */
.sakura{
    position:fixed;
    top:-20px;
    pointer-events:none;
    z-index:9999;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}

audio{
    display:none;
}

</style>
</head>

<body>

<div class="container">

    <button class="love-btn" onclick="toggleMusic()">
        Люблю Диану
    </button>

    <div class="playlist">
        <div class="playlist-title">playlist</div>

        <div class="track" onclick="playTrack(0)">spicy</div>
        <div class="track" onclick="playTrack(1)">Тебе Нравится</div>
        <div class="track" onclick="playTrack(2)">Ведь Меня Погубила Глубина Этих Глаз</div>
    </div>

</div>

<audio id="audio"></audio>

<script>

/* 🌸 SAKURA */
function createSakura(){
    const el=document.createElement("div");
    el.className="sakura";
    el.innerHTML="🌸";

    el.style.left=Math.random()*100+"vw";
    el.style.fontSize=(12+Math.random()*20)+"px";
    el.style.animationDuration=(4+Math.random()*6)+"s";

    document.body.appendChild(el);

    setTimeout(()=>el.remove(),10000);
}

setInterval(createSakura,120);

/* 🎵 MUSIC */
const tracks=[
    "mp1.mp3",
    "mp2.mp3",
    "mp3.mp3"
];

let current=0;
let audio=document.getElementById("audio");
const trackEls=document.querySelectorAll(".track");

/* PLAY TRACK */
function playTrack(i){

    current=i;

    audio.src=tracks[i];
    audio.load();
    audio.play().catch(e=>console.log(e));

    trackEls.forEach(t=>t.classList.remove("active"));
    trackEls[i].classList.add("active");
}

/* кнопка просто включает/пауза текущий */
function toggleMusic(){

    if(audio.paused){
        audio.play().catch(e=>console.log(e));
    } else {
        audio.pause();
    }
}

</script>

</body>
</html>
