<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diana Sakura</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,sans-serif;

    overflow-x:hidden;

    min-height:100vh;

    background:
    linear-gradient(
    180deg,
    #fff4fa 0%,
    #ffd6ea 45%,
    #ffbddb 100%
    );

    position:relative;
}

/* ВРЕМЯ */

.time-box{

    position:fixed;

    top:15px;

    left:50%;

    transform:translateX(-50%);

    background:white;

    padding:12px 32px;

    border-radius:999px;

    z-index:999;

    box-shadow:
    0 0 20px rgba(255,255,255,0.9);
}

#clock{

    color:#ff7eb7;

    font-size:24px;

    font-weight:bold;

    letter-spacing:2px;

    text-shadow:
    0 0 10px #ffd4e8;
}

/* 🌸 САКУРА */

.sakura{

    position:fixed;

    top:-50px;

    z-index:1;

    font-size:24px;

    pointer-events:none;

    animation:
    sakuraFall linear infinite,
    glow 2s ease-in-out infinite alternate;
}

@keyframes sakuraFall{

    0%{
        transform:
        translateY(-100px)
        rotate(0deg);

        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:
        translateY(120vh)
        rotate(360deg);

        opacity:0;
    }
}

@keyframes glow{

    from{
        filter:
        drop-shadow(0 0 2px white);
    }

    to{
        filter:
        drop-shadow(0 0 10px #ff8fc7);
    }
}

/* КОНТЕЙНЕР */

.container{

    position:relative;

    z-index:5;

    width:100%;

    padding-top:90px;

    display:flex;

    flex-direction:column;

    align-items:center;
}

/* ФОТО */

.photos{

    width:100%;

    position:relative;

    height:700px;
}

.photo{

    position:absolute;

    width:38vw;

    max-width:170px;

    border-radius:14px;

    box-shadow:
    0 0 20px rgba(255,255,255,0.7);

    transition:0.3s;
}

.photo:hover{

    transform:scale(1.03);
}

.photo1{

    top:20px;
    left:20px;

    transform:rotate(-5deg);
}

.photo2{

    top:240px;
    right:20px;

    transform:rotate(5deg);
}

.photo3{

    top:500px;
    left:70px;

    transform:rotate(-4deg);
}

/* PLAYLIST */

.playlist{

    width:100%;

    display:flex;

    flex-direction:column;

    align-items:center;

    padding-bottom:60px;
}

.playlist-title{

    color:white;

    font-size:42px;

    margin-bottom:30px;

    text-shadow:
    0 0 8px white,
    0 0 18px white,
    0 0 30px white;
}

/* ТРЕКИ */

.track{

    width:280px;

    background:
    rgba(255,255,255,0.2);

    backdrop-filter:blur(10px);

    padding:16px;

    border-radius:20px;

    margin-bottom:18px;

    color:white;

    text-align:center;

    cursor:pointer;

    transition:0.3s;

    font-size:18px;

    text-shadow:
    0 0 8px white;

    box-shadow:
    0 0 15px rgba(255,255,255,0.3);
}

.track:hover{

    transform:scale(1.03);
}

.track.active{

    background:
    rgba(255,255,255,0.35);

    box-shadow:
    0 0 25px white;
}

/* КНОПКИ */

.controls{

    display:none;

    gap:25px;

    margin-bottom:25px;

    color:white;

    font-size:34px;

    text-shadow:
    0 0 10px white,
    0 0 20px #ffb6d9;
}

.controls.show{

    display:flex;
}

.controls span{

    cursor:pointer;

    transition:0.2s;
}

.controls span:hover{

    transform:scale(1.2);
}

/* ПК */

@media(min-width:768px){

    .photo{
        width:180px;
    }

    .photo1{
        left:150px;
    }

    .photo2{
        right:150px;
    }

    .photo3{
        left:240px;
    }
}

</style>
</head>

<body>

<!-- ВРЕМЯ -->

<div class="time-box">
    <span id="clock">00 : 00</span>
</div>

<!-- 🌸 ЛЕПЕСТКИ -->

<div class="sakura" style="left:3%;animation-duration:7s;">🌸</div>
<div class="sakura" style="left:10%;animation-duration:8s;">🌸</div>
<div class="sakura" style="left:17%;animation-duration:6s;">🌸</div>
<div class="sakura" style="left:24%;animation-duration:9s;">🌸</div>
<div class="sakura" style="left:31%;animation-duration:7s;">🌸</div>
<div class="sakura" style="left:38%;animation-duration:8s;">🌸</div>
<div class="sakura" style="left:45%;animation-duration:6s;">🌸</div>
<div class="sakura" style="left:52%;animation-duration:9s;">🌸</div>
<div class="sakura" style="left:59%;animation-duration:7s;">🌸</div>
<div class="sakura" style="left:66%;animation-duration:8s;">🌸</div>

<div class="sakura" style="left:73%;animation-duration:6s;">🌸</div>
<div class="sakura" style="left:80%;animation-duration:9s;">🌸</div>
<div class="sakura" style="left:87%;animation-duration:7s;">🌸</div>
<div class="sakura" style="left:94%;animation-duration:8s;">🌸</div>

<div class="container">

    <!-- ФОТО -->

    <div class="photos">

        <img src="d1.jpg" class="photo photo1">

        <img src="d2.jpg" class="photo photo2">

        <img src="d3.jpg" class="photo photo3">

    </div>

    <!-- PLAYLIST -->

    <div class="playlist">

        <div class="playlist-title">playlist</div>

        <div class="track active" onclick="playTrack(0)">
            spicy
        </div>

        <!-- КНОПКИ -->

        <div class="controls show" id="controls">

            <span onclick="prev()">⏮️</span>

            <span onclick="toggle()">▶️</span>

            <span onclick="next()">⏭️</span>

        </div>

        <div class="track" onclick="playTrack(1)">
            Ведь Меня Погубила Глубина Этих Глаз
        </div>

        <div class="track" onclick="playTrack(2)">
            Тебе нравится
        </div>

    </div>

</div>

<!-- AUDIO -->

<audio id="audio"></audio>

<script>

/* ТРЕКИ */

const tracks = [

    "spicy.mp3",

    "Ведь Меня Погубила Глубина Этих Глаз.mp3",

    "Тебе нравится.mp3"
];

let current = 0;

const audio = document.getElementById("audio");

const trackEls = document.querySelectorAll(".track");

/* PLAY TRACK */

function playTrack(index){

    current = index;

    audio.src = tracks[index];

    audio.play();

    trackEls.forEach(track =>
        track.classList.remove("active")
    );

    trackEls[index].classList.add("active");
}

/* PLAY / PAUSE */

function toggle(){

    if(audio.paused){

        audio.play();

    }else{

        audio.pause();
    }
}

/* NEXT */

function next(){

    current = (current + 1) % tracks.length;

    playTrack(current);
}

/* PREV */

function prev(){

    current = (current - 1 + tracks.length) % tracks.length;

    playTrack(current);
}

/* ЧАСЫ */

function updateClock(){

    const now = new Date();

    let hours = now.getHours();

    let minutes = now.getMinutes();

    if(hours < 10){
        hours = "0" + hours;
    }

    if(minutes < 10){
        minutes = "0" + minutes;
    }

    document.getElementById("clock").innerText =
        hours + " : " + minutes;
}

setInterval(updateClock,1000);

updateClock();

</script>

</body>
</html>
