<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana Sakura</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    overflow-y:auto;
    min-height:100vh;
    background:linear-gradient(180deg,#fff4fa,#ffd6ea,#ffbddb);
}

/* CLOCK */
.time-box{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:12px 32px;
    border-radius:999px;
    z-index:9999;
    box-shadow:0 0 20px rgba(255,255,255,0.9);
}

#clock{
    color:#ff7eb7;
    font-size:24px;
    font-weight:bold;
}

/* CONTAINER */
.container{
    padding-top:90px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* BUTTON */
.love-btn{
    margin:20px auto 40px;
    display:inline-block;
    background:#ff8fc7;
    color:white;
    padding:14px 34px;
    border-radius:999px;
    text-decoration:none;
    font-weight:bold;
    transition:0.25s ease;
}

/* 💗 hover pulse */
.love-btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px rgba(255,255,255,0.8);
}

/* PHOTOS */
.photos{
    position:relative;
    width:100%;
    height:700px;
}

.photo{
    position:absolute;
    width:38vw;
    max-width:170px;
    border-radius:18px;
    border:3px solid white;
    box-shadow:0 0 20px rgba(255,255,255,0.9);
    transition:0.25s ease;
}

/* hover zoom */
.photo:hover{
    transform:scale(1.08);
}

.photo1{top:20px;left:20px;rotate:-5deg;}
.photo2{top:250px;right:20px;rotate:5deg;}
.photo3{top:500px;left:40px;rotate:-4deg;} /* 👈 сдвинута левее */

/* PLAYLIST */
.playlist{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-bottom:60px;
}

.playlist-title{
    color:white;
    font-size:42px;
    margin-bottom:25px;
    text-shadow:0 0 10px white;
}

/* TRACK */
.track{
    width:290px;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(10px);
    padding:16px;
    border-radius:20px;
    border:2px solid white;
    margin-bottom:18px;
    color:white;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.track:hover{
    transform:scale(1.05);
}

.track.active{
    background:rgba(255,255,255,0.35);
}

/* CONTROLS (СТАБИЛЬНО КАК У ТЕБЯ ВО 2 ПРОЕКТЕ) */
.controls{
    display:none;
    gap:30px;
    margin:10px 0 20px;
}

.controls.show{
    display:flex;
}

.controls span{
    width:58px;
    height:58px;
    background:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:26px;
    transition:0.2s;
}

.controls span:hover{
    transform:scale(1.2);
}

/* 🌸 SAKURA / LEAVES */
.sakura{
    position:fixed;
    top:-20px;
    pointer-events:none;
    z-index:9999;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}

</style>
</head>

<body>

<!-- CLOCK -->
<div class="time-box">
    <span id="clock">00 : 00</span>
</div>

<div class="container">

<a href="https://t.me/ilmbfsmDD" class="love-btn">
    Люблю Диану
</a>

<div class="photos">
    <img src="d1.jpg" class="photo photo1">
    <img src="d2.jpg" class="photo photo2">
    <img src="d3.jpg" class="photo photo3">
</div>

<div class="playlist">

<div class="playlist-title">playlist</div>

<div class="track" onclick="playTrack(0)">spicy</div>
<div class="track" onclick="playTrack(1)">Тебе нравится</div>
<div class="track" onclick="playTrack(2)">Ведь Меня Погубила Глубина Этих Глаз</div>

<div class="controls" id="controls">
    <span onclick="prev()">⏮️</span>
    <span onclick="toggle()" id="playBtn">▶️</span>
    <span onclick="next()">⏭️</span>
</div>

</div>

</div>

<audio id="audio"></audio>

<script>
    /* CLOCK */
function updateClock(){
    const d=new Date();
    let h=d.getHours();
    let m=d.getMinutes();
    if(h<10)h="0"+h;
    if(m<10)m="0"+m;
    document.getElementById("clock").innerText=h+" : "+m;
}
setInterval(updateClock,1000);
updateClock();

/* TRACKS */
const tracks=[
    "mp1.mp3",
    "mp2.mp3",
    "mp3.mp3"
];

let current=0;

const audio=document.getElementById("audio");
const trackEls=document.querySelectorAll(".track");
const controls=document.getElementById("controls");
const playBtn=document.getElementById("playBtn");

/* PLAY */
function playTrack(i){

    current=i;

    audio.src=tracks[i];
    audio.play();

    trackEls.forEach(t=>t.classList.remove("active"));
    trackEls[i].classList.add("active");

    controls.classList.add("show");
}

/* TOGGLE */
function toggle(){
    if(audio.paused){
        audio.play();
        playBtn.innerText="⏸️";
    }else{
        audio.pause();
        playBtn.innerText="▶️";
    }
}

/* NEXT */
function next(){
    current=(current+1)%tracks.length;
    playTrack(current);
}

/* PREV */
function prev(){
    current=(current-1+tracks.length)%tracks.length;
    playTrack(current);
}

/* 🌸 SAKURA */
function createSakura(){
    const el=document.createElement("div");
    el.className="sakura";

    const items=["🌸","🍃","💮"];
    el.innerHTML=items[Math.floor(Math.random()*items.length)];

    el.style.left=Math.random()*100+"vw";
    el.style.fontSize=(12+Math.random()*20)+"px";
    el.style.animationDuration=(4+Math.random()*6)+"s";

    document.body.appendChild(el);

    setTimeout(()=>el.remove(),10000);
}

setInterval(createSakura,120);

</script>

</body>
</html>
