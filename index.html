.center {

}

  border-radius: 20px;  
  background: rgba(255,255,255,0.05);  
  backdrop-filter: blur(10px);  
}  
  
.playlist {  
  text-align: center;  
  font-size: 24px;  
  margin-bottom: 20px;  
  text-shadow: 0 0 15px white;  
}

.track {  
  padding: 12px;  
  margin: 10px 0;  
  border-radius: 10px;  
  cursor: pointer;  
  background: rgba(255,255,255,0.1);  
  transition: 0.3s;  
}  
  
.track.active {  
  background: hotpink;  
}

}  
  
.controls.show {

.controls span {

  color: hotpink;  
  
  text-shadow:

    0 0 15px hotpink;  
  
  transition: 0.3s;  
}  
  
.controls span:hover {

  text-shadow:  
    0 0 12px hotpink,  
    0 0 25px hotpink,  
    0 0 40px hotpink;  
}  
  
/* анимация появления */  
@keyframes drop {  
  from {  
    transform: translateY(-10px);  
    opacity: 0;  
  }

}

}  
  
@keyframes fall {  
  to {  
    transform: translateY(110vh) rotate(360deg);  
    opacity: 0;  
  }  
}
