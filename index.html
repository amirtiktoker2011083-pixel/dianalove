<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;

    background:url("fon.jpg") no-repeat center center;
    background-size:cover;

    font-family:Arial,sans-serif;
}

.container{
    position:relative;
    width:100%;
    height:100%;
}

/* ФОТО */

.photo{
    position:absolute;

    width:105px;

    z-index:2;
}

/* ПОЗИЦИИ ФОТО */

.photo1{
    top:170px;
    left:125px;
}

.photo2{
    top:410px;
    right:120px;
}

.photo3{
    bottom:250px;
    left:70px;
}

/* ПАДАЮЩИЕ ЗАЙЧИКИ */

.bunny{
    position:absolute;

    width:70px;

    top:-150px;

    z-index:1;

    pointer-events:none;

    animation-name:fall;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
}

/* РАЗНЫЕ ПОЗИЦИИ */

.b1{
    left:5%;
    animation-duration:18s;
    animation-delay:0s;
}

.b2{
    left:25%;
    animation-duration:22s;
    animation-delay:4s;
}

.b3{
    left:45%;
    animation-duration:20s;
    animation-delay:2s;
}

.b4{
    left:65%;
    animation-duration:24s;
    animation-delay:6s;
}

.b5{
    left:82%;
    animation-duration:19s;
    animation-delay:3s;
}

/* АНИМАЦИЯ ПАДЕНИЯ */

@keyframes fall{

    0%{
        transform:translateY(-200px) rotate(0deg);
        opacity:1;
    }

    100%{
        transform:translateY(140vh) rotate(360deg);
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- ФОТО В РАМКАХ -->

    <img src="d1.jpg" class="photo photo1" alt="">
    <img src="d2.jpg" class="photo photo2" alt="">
    <img src="d3.jpg" class="photo photo3" alt="">

    <!-- ПАДАЮЩИЕ ЗАЙЧИКИ -->

    <img src="bunny.png" class="bunny b1" alt="">
    <img src="bunny.png" class="bunny b2" alt="">
    <img src="bunny.png" class="bunny b3" alt="">
    <img src="bunny.png" class="bunny b4" alt="">
    <img src="bunny.png" class="bunny b5" alt="">

</div>

</body>
</html>
