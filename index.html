<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diana Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;

    /* ФОН */
    background:url("fon.jpg") no-repeat center center;
    background-size:cover;

    font-family:Arial,sans-serif;
}

.container{
    position:relative;
    width:100%;
    height:100%;
}

/* РАМКИ */

.frame{
    position:absolute;

    width:220px;
    height:220px;

    background:white;

    border:7px solid black;
    border-radius:12px;

    overflow:hidden;

    transition:0.3s;
}

.frame:hover{
    transform:scale(1.05);
}

/* КАРТИНКИ */

.frame img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ПОЗИЦИИ */

.frame1{
    top:120px;
    left:180px;
}

.frame2{
    top:340px;
    right:160px;
}

.frame3{
    bottom:120px;
    left:100px;
}

/* ЗАЙЧИК */

.bunny{
    position:absolute;

    bottom:20px;
    left:50%;

    transform:translateX(-50%);

    width:240px;

    pointer-events:none;
}

/* ТЕЛЕФОН */

@media (max-width:768px){

    .frame{
        width:160px;
        height:160px;
    }

    .frame1{
        top:90px;
        left:20px;
    }

    .frame2{
        top:320px;
        right:20px;
    }

    .frame3{
        bottom:140px;
        left:20px;
    }

    .bunny{
        width:180px;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- ФОТО 1 -->
    <div class="frame frame1">
        <img src="d1.jpg" alt="">
    </div>

    <!-- ФОТО 2 -->
    <div class="frame frame2">
        <img src="d2.jpg" alt="">
    </div>

    <!-- ФОТО 3 -->
    <div class="frame frame3">
        <img src="d3.jpg" alt="">
    </div>

    <!-- ЗАЙЧИК -->
    <img src="bunny.png" class="bunny" alt="">

</div>

</body>
</html>
