<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diana Sakura</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,sans-serif;

    overflow-x:hidden;

    min-height:100vh;

    background:
    linear-gradient(
    180deg,
    #fff7fb 0%,
    #ffd8ea 45%,
    #ffbfdc 100%
    );

    position:relative;
}

/* 🌸 ДЕРЕВО САКУРЫ */

.tree{

    position:fixed;

    top:0;
    left:0;

    width:100%;

    opacity:0.95;

    z-index:1;

    pointer-events:none;

    animation:treeFloat 6s ease-in-out infinite alternate;
}

@keyframes treeFloat{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(6px);
    }
}

/* 🌸 ЛЕПЕСТКИ */

.sakura{

    position:fixed;

    top:-50px;

    z-index:2;

    font-size:24px;

    pointer-events:none;

    animation:
    sakuraFall linear infinite,
    sakuraGlow 2s ease-in-out infinite alternate;
}

/* ПАДЕНИЕ */

@keyframes sakuraFall{

    0%{
        transform:
        translateY(-100px)
        rotate(0deg);

        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:
        translateY(120vh)
        rotate(360deg);

        opacity:0;
    }
}

/* ГЛОВ */

@keyframes sakuraGlow{

    from{
        filter:
        drop-shadow(0 0 3px white)
        brightness(1);
    }

    to{
        filter:
        drop-shadow(0 0 10px #ff9ccc)
        brightness(1.2);
    }
}

/* КОНТЕЙНЕР */

.container{

    position:relative;

    z-index:5;

    width:100%;

    padding-top:50px;

    display:flex;

    flex-direction:column;

    align-items:center;
}

/* ФОТО */

.photos{

    width:100%;

    position:relative;

    height:720px;
}

.photo{

    position:absolute;

    width:38vw;

    max-width:170px;

    border-radius:14px;

    box-shadow:
    0 0 20px rgba(255,255,255,0.7);

    transition:0.3s;
}

.photo:hover{

    transform:scale(1.04);
}

/* РАСПОЛОЖЕНИЕ */

.photo1{

    top:60px;
    left:20px;

    transform:rotate(-5deg);
}

.photo2{

    top:270px;
    right:20px;

    transform:rotate(5deg);
}

.photo3{

    top:530px;
    left:70px;

    transform:rotate(-4deg);
}

/* PLAYLIST */

.playlist{

    width:100%;

    display:flex;

    flex-direction:column;

    align-items:center;

    padding-bottom:60px;
}

/* PLAYLIST TEXT */

.playlist h1{

    color:white;

    font-size:42px;

    margin-bottom:25px;

    text-shadow:
    0 0 8px white,
    0 0 16px white,
    0 0 30px #fff;
}

/* TRACK */

.track{

    width:90%;

    max-width:320px;

    margin-bottom:28px;

    text-align:center;
}

.track p{

    color:white;

    margin-bottom:10px;

    font-size:18px;

    text-shadow:
    0 0 8px white,
    0 0 16px white;
}

/* AUDIO */

audio{

    width:100%;

    border-radius:20px;

    opacity:0.95;
}

</style>
</head>

<body>

<!-- 🌸 ДЕРЕВО -->

<img src="1000041669.jpg" class="tree">

<!-- 🌸 ПАДАЮЩИЕ ЛЕПЕСТКИ -->

<div class="sakura" style="left:3%;animation-duration:7s;">🌸</div>
<div class="sakura" style="left:8%;animation-duration:8s;">🌸</div>
<div class="sakura" style="left:14%;animation-duration:6s;">🌸</div>
<div class="sakura" style="left:20%;animation-duration:9s;">🌸</div>
<div class="sakura" style="left:26%;animation-duration:7s;">🌸</div>

<div class="sakura" style="left:32%;animation-duration:8s;">🌸</div>
<div class="sakura" style="left:38%;animation-duration:6s;">🌸</div>
<div class="sakura" style="left:44%;animation-duration:9s;">🌸</div>
<div class="sakura" style="left:50%;animation-duration:7s;">🌸</div>
<div class="sakura" style="left:56%;animation-duration:8s;">🌸</div>

<div class="sakura" style="left:62%;animation-duration:6s;">🌸</div>
<div class="sakura" style="left:68%;animation-duration:9s;">🌸</div>
<div class="sakura" style="left:74%;animation-duration:7s;">🌸</div>
<div class="sakura" style="left:80%;animation-duration:8s;">🌸</div>
<div class="sakura" style="left:86%;animation-duration:6s;">🌸</div>
<div class="sakura" style="left:92%;animation-duration:9s;">🌸</div>

<div class="container">

    <!-- ФОТО -->

    <div class="photos">

        <img src="d1.jpg" class="photo photo1">

        <img src="d2.jpg" class="photo photo2">

        <img src="d3.jpg" class="photo photo3">

    </div>

    <!-- PLAYLIST -->

    <div class="playlist">

        <h1>playlist</h1>

        <div class="track">

            <p>spicy</p>

            <audio controls>
                <source src="spicy.mp3" type="audio/mpeg">
            </audio>

        </div>

        <div class="track">

            <p>Ведь Меня Погубила Глубина Этих Глаз</p>

            <audio controls>
                <source src="Ведь Меня Погубила Глубина Этих Глаз.mp3" type="audio/mpeg">
            </audio>

        </div>

        <div class="track">

            <p>Тебе нравится</p>

            <audio controls>
                <source src="Тебе нравится.mp3" type="audio/mpeg">
            </audio>

        </div>

    </div>

</div>

</body>
</html>
