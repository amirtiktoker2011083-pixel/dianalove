<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diana Sakura</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,sans-serif;

    overflow-x:hidden;

    min-height:100vh;

    background:
    linear-gradient(
    180deg,
    #fff4fa 0%,
    #ffd6ea 45%,
    #ffbddb 100%
    );

    position:relative;
}

/* ВРЕМЯ */

.time-box{

    position:fixed;

    top:15px;

    left:50%;

    transform:translateX(-50%);

    background:white;

    padding:12px 32px;

    border-radius:999px;

    z-index:9999;

    box-shadow:
    0 0 20px rgba(255,255,255,0.9);
}

#clock{

    color:#ff7eb7;

    font-size:24px;

    font-weight:bold;

    letter-spacing:2px;

    text-shadow:
    0 0 10px #ffd4e8;
}

/* 🌸 САКУРА */

.sakura{

    position:fixed;

    top:-60px;

    z-index:999;

    pointer-events:none;

    animation:
    sakuraFall linear forwards,
    glow 2s ease-in-out infinite alternate;
}

@keyframes sakuraFall{

    0%{

        transform:
        translateY(-100px)
        rotate(0deg);

        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{

        transform:
        translateY(120vh)
        rotate(360deg);

        opacity:0;
    }
}

@keyframes glow{

    from{
        filter:
        drop-shadow(0 0 2px white);
    }

    to{
        filter:
        drop-shadow(0 0 12px #ff8fc7);
    }
}

/* КОНТЕЙНЕР */

.container{

    position:relative;

    z-index:5;

    width:100%;

    padding-top:90px;

    display:flex;

    flex-direction:column;

    align-items:center;
}

/* ФОТО */

.photos{

    width:100%;

    position:relative;

    height:700px;
}

.photo{

    position:absolute;

    width:38vw;

    max-width:170px;

    border-radius:18px;

    border:3px solid white;

    box-shadow:
    0 0 20px rgba(255,255,255,0.9);

    z-index:10;

    transition:0.3s;
}

/* ПУЛЬС */

.photo:hover,
.photo:active{

    transform:scale(1.08);
}

/* ПОЗИЦИИ */

.photo1{

    top:20px;
    left:20px;

    rotate:-5deg;
}

.photo2{

    top:250px;
    right:20px;

    rotate:5deg;
}

.photo3{

    top:500px;
    left:70px;

    rotate:-4deg;
}

/* PLAYLIST */

.playlist{

    width:100%;

    display:flex;

    flex-direction:column;

    align-items:center;

    padding-bottom:60px;
}

.playlist-title{

    color:white;

    font-size:42px;

    margin-bottom:25px;

    text-shadow:
    0 0 8px white,
    0 0 18px white,
    0 0 30px white;
}

/* ТРЕК */

.track{

    width:290px;

    background:
    rgba(255,255,255,0.18);

    backdrop-filter:blur(10px);

    padding:16px;

    border-radius:20px;

    border:2px solid white;

    margin-bottom:18px;

    color:white;

    text-align:center;

    cursor:pointer;

    transition:0.3s;

    font-size:18px;

    text-shadow:
    0 0 8px white;

    box-shadow:
    0 0 15px rgba(255,255,255,0.4);
}

.track:hover{

    transform:scale(1.03);
}

.track.active{

    background:
    rgba(255,255,255,0.3);

    box-shadow:
    0 0 25px white;
}

/* КНОПКИ */

.controls{

    display:none;

    gap:30px;

    margin-top:-5px;

    margin-bottom:20px;
}

.controls.show{

    display:flex;
}

.controls span{

    width:58px;

    height:58px;

    background:white;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    cursor:pointer;

    font-size:26px;

    box-shadow:
    0 0 18px rgba(255,255,255,0.9);

    transition:0.2s;
}

.controls span:hover{

    transform:scale(1.08);
}

</style>
</head>

<body>

<!-- ВРЕМЯ -->

<div class="time-box">
    <span id="clock">00 : 00</span>
</div>

<div class="container">

    <!-- ФОТО -->

    <div class="photos">

        <img src="d1.jpg" class="photo photo1">

        <img src="d2.jpg" class="photo photo2">

        <img src="d3.jpg" class="photo photo3">

    </div>

    <!-- PLAYLIST -->

    <div class="playlist">

        <div class="playlist-title">playlist</div>
        <div class="track" onclick="playTrack(0)">
            spicy
        </div>

        <!-- КНОПКИ -->

        <div class="controls" id="controls">

            <span onclick="prev()">⏮️</span>

            <span id="playBtn" onclick="toggle()">▶️</span>

            <span onclick="next()">⏭️</span>

        </div>

        <div class="track" onclick="playTrack(1)">
            Тебе нравится
        </div>

        <div class="track" onclick="playTrack(2)">
            Ведь Меня Погубила Глубина Этих Глаз
        </div>

    </div>

</div>

<!-- AUDIO -->

<audio id="audio"></audio>

<script>

/* 🌸 БЕСКОНЕЧНЫЕ ЛЕПЕСТКИ */

setInterval(() => {

    const sakura = document.createElement("div");

    sakura.className = "sakura";

    sakura.innerHTML = "🌸";

    sakura.style.left =
        Math.random() * window.innerWidth + "px";

    sakura.style.fontSize =
        (18 + Math.random() * 22) + "px";

    sakura.style.animationDuration =
        (4 + Math.random() * 4) + "s";

    document.body.appendChild(sakura);

    setTimeout(() => {

        sakura.remove();

    }, 9000);

}, 120);

/* ЧАСЫ */

function updateClock(){

    const now = new Date();

    let h = now.getHours();
    let m = now.getMinutes();

    if(h < 10) h = "0" + h;
    if(m < 10) m = "0" + m;

    document.getElementById("clock").innerText =
        h + " : " + m;
}

setInterval(updateClock,1000);

updateClock();

/* ТРЕКИ */

const tracks = [

    "mp1.mp3",

    "mp2.mp3",

    "mp3.mp3"
];

let current = 0;

const audio = document.getElementById("audio");

const trackEls = document.querySelectorAll(".track");

const controls = document.getElementById("controls");

const playBtn = document.getElementById("playBtn");

/* PLAY TRACK */

function playTrack(index){

    current = index;

    audio.src = tracks[index];

    audio.play();

    playBtn.innerText = "⏸️";

    trackEls.forEach(track =>
        track.classList.remove("active")
    );

    trackEls[index].classList.add("active");

    trackEls[index].after(controls);

    controls.classList.add("show");
}

/* PLAY / PAUSE */

function toggle(){

    if(audio.paused){

        audio.play();

        playBtn.innerText = "⏸️";

    }else{

        audio.pause();

        playBtn.innerText = "▶️";
    }
}

/* NEXT */

function next(){

    current = (current + 1) % tracks.length;

    playTrack(current);
}

/* PREV */

function prev(){

    current = (current - 1 + tracks.length) % tracks.length;

    playTrack(current);
}

/* AUTO NEXT */

audio.addEventListener("ended", () => {

    next();
});

</script>

</body>
</html>
