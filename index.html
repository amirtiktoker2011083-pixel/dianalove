<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diana Sakura</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;

    font-family:Arial,sans-serif;

    /* РОЗОВО-БЕЛЫЙ ФОН */

    background:
    linear-gradient(
    135deg,
    #ffffff 0%,
    #ffd3e8 25%,
    #ffb8da 50%,
    #ffd9ec 75%,
    #ffffff 100%
    );

    position:relative;
}

/* ДИАГОНАЛЬНЫЕ ТОЧКИ */

body::before{
    content:"";

    position:absolute;

    width:100%;
    height:100%;

    background-image:
    radial-gradient(rgba(255,255,255,0.9) 2px, transparent 2px);

    background-size:40px 40px;

    transform:rotate(-20deg) scale(1.3);

    opacity:0.8;

    z-index:0;
}

/* МЯГКИЕ ПЯТНА */

body::after{
    content:"";

    position:absolute;

    width:600px;
    height:600px;

    background:rgba(255,255,255,0.15);

    border-radius:50%;

    top:-200px;
    left:-150px;

    filter:blur(40px);

    z-index:0;
}

/* ФОТО */

.photo{
    position:absolute;

    width:145px;

    z-index:3;

    transition:0.3s;
}

.photo:hover{
    transform:scale(1.05);
}

/* ХАОТИЧНО */

.photo1{
    top:90px;
    left:25px;

    transform:rotate(-5deg);
}

.photo2{
    top:260px;
    right:30px;

    transform:rotate(6deg);
}

.photo3{
    bottom:220px;
    left:75px;

    transform:rotate(-4deg);
}

/* PLAYLIST */

.playlist{
    position:absolute;

    bottom:35px;
    left:50%;

    transform:translateX(-50%);

    text-align:center;

    z-index:5;

    color:white;
}

/* ЗАГОЛОВОК */

.playlist h1{

    font-size:32px;

    margin-bottom:15px;

    text-transform:lowercase;

    text-shadow:
    0 0 10px white,
    0 0 20px white,
    0 0 35px white;
}

/* ТРЕКИ */

.track{
    margin:12px 0;
}

.track p{

    color:white;

    margin-bottom:5px;

    text-shadow:
    0 0 8px white,
    0 0 15px white;
}

/* АУДИО */

audio{
    width:260px;

    border-radius:20px;

    opacity:0.9;
}

/* 🌸 САКУРА */

.sakura{
    position:absolute;

    top:-100px;

    font-size:28px;

    opacity:0.9;

    pointer-events:none;

    animation:fall linear infinite;

    z-index:1;
}

/* АНИМАЦИЯ */

@keyframes fall{

    0%{
        transform:
        translateY(-100px)
        translateX(0px)
        rotate(0deg);

        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:
        translateY(120vh)
        translateX(80px)
        rotate(360deg);

        opacity:0;
    }
}

</style>
</head>

<body>

<!-- 🌸 САКУРА -->
